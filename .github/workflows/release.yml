name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo package --locked
      - run: |
          mkdir -p dist
          cp target/package/leash-harness-*.crate dist/
      - uses: actions/upload-artifact@v4
        with:
          name: crate
          path: dist/*.crate

  binaries:
    name: binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked --target "${{ matrix.target }}"
      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          name="leash-${{ matrix.target }}"
          archive="$name.tar.gz"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/leash" "dist/$name/leash"
          cp README.md LICENSE "dist/$name/"
          tar -C dist -czf "dist/$archive" "$name"
          checksum="$(shasum -a 256 "dist/$archive" | awk '{print $1}')"
          printf "%s  %s\n" "$checksum" "$archive" > "dist/$archive.sha256"
      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "leash-${{ matrix.target }}"
          $archive = "$name.zip"
          New-Item -ItemType Directory -Force "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/leash.exe" "dist/$name/leash.exe"
          Copy-Item README.md,LICENSE "dist/$name/"
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$archive" -Force
          $hash = (Get-FileHash "dist/$archive" -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Set-Content -NoNewline "dist/$archive.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: leash-${{ matrix.target }}
          path: dist/leash-${{ matrix.target }}.*

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - crate
      - binaries
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --draft \
            --generate-notes \
            --title "Leash $GITHUB_REF_NAME"
