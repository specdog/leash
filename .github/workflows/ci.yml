name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features
      - run: cargo test --no-default-features --features sim,mcp
      - run: cargo package --locked
      - run: cargo run --quiet -- show-config waveshare-ugv --listen 0.0.0.0:8000 --allow-physical-actuation | node -e 'const fs=require("node:fs"); const config=JSON.parse(fs.readFileSync(0,"utf8")); if (!config.physical || !config.physical_actuation_enabled || config.network_bind !== "0.0.0.0:8000") process.exit(1);'
      - run: cargo run --quiet -- show-config --accelerator cpu --require-accelerator | node -e 'const fs=require("node:fs"); const config=JSON.parse(fs.readFileSync(0,"utf8")); if (config.accelerator !== "cpu" || config.require_accelerator !== true) process.exit(1);'
      - run: scripts/smoke-http.sh
      - run: scripts/smoke-mcp.sh
      - run: scripts/smoke-physical-gate.sh
      - run: scripts/smoke-daemon.sh

  feature-matrix:
    name: feature-matrix (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core-only-lib
            command: cargo check --no-default-features --lib
          - name: default
            command: cargo check
          - name: mcp-only
            command: cargo check --no-default-features --features mcp
          - name: http-sim
            command: cargo check --no-default-features --features sim,http
          - name: hardware-adapter
            command: cargo check --no-default-features --features sim,http,mcp,waveshare-ugv,bridge-compat
          - name: all-features
            command: cargo check --all-features
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev
      - run: ${{ matrix.command }}
